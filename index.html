<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>방산고 급식 알리미</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold:        #d4a017;
            --gold-light:  #f0c040;
            --green-light: #4db870;
            --white:       #ffffff;
            --glass-bg:    rgba(255, 255, 255, 0.12);
            --glass-border:rgba(255, 255, 255, 0.25);
            --glass-shadow:rgba(26, 92, 46, 0.35);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Noto Serif KR', serif;
            background: linear-gradient(135deg, #0f3d1f 0%, #1a5c2e 30%, #2e6b20 55%, #1e4d10 75%, #0a2e12 100%);
            overflow: hidden;
            position: relative;
        }

        body::before, body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            pointer-events: none;
            z-index: 0;
        }
        body::before {
            width: 500px; height: 500px;
            background: radial-gradient(circle, var(--gold) 0%, transparent 70%);
            top: -150px; right: -100px;
            animation: floatA 12s ease-in-out infinite alternate;
        }
        body::after {
            width: 400px; height: 400px;
            background: radial-gradient(circle, var(--green-light) 0%, transparent 70%);
            bottom: -100px; left: -80px;
            animation: floatB 10s ease-in-out infinite alternate;
        }
        @keyframes floatA {
            from { transform: translate(0,0) scale(1); }
            to   { transform: translate(-40px,60px) scale(1.1); }
        }
        @keyframes floatB {
            from { transform: translate(0,0) scale(1); }
            to   { transform: translate(50px,-40px) scale(1.15); }
        }

        .bg-pattern {
            position: fixed; inset: 0; z-index: 0; opacity: 0.06;
            background-image:
                repeating-linear-gradient(60deg, transparent, transparent 40px, rgba(212,160,23,0.8) 40px, rgba(212,160,23,0.8) 41px),
                repeating-linear-gradient(-60deg, transparent, transparent 40px, rgba(255,255,255,0.5) 40px, rgba(255,255,255,0.5) 41px);
        }

        /* ── 카드 ── */
        .card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 380px;
            margin: 20px;
            padding: 32px 32px 28px;
            border-radius: 28px;
            background: var(--glass-bg);
            backdrop-filter: blur(24px) saturate(1.6);
            -webkit-backdrop-filter: blur(24px) saturate(1.6);
            border: 1px solid var(--glass-border);
            box-shadow:
                0 8px 48px var(--glass-shadow),
                0 2px 8px rgba(0,0,0,0.2),
                inset 0 1px 0 rgba(255,255,255,0.3);
            animation: cardIn 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(30px) scale(0.96); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ── 헤더 ── */
        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.15);
        }
        .logo-wrap { width: 88px; height: 88px; display: flex; align-items: center; justify-content: center; }
        .logo-wrap img { width: 88px; height: 88px; object-fit: contain; filter: drop-shadow(0 4px 12px rgba(0,0,0,0.35)); }
        .school-name {
            font-size: 0.72rem; font-family: 'DM Mono', monospace;
            letter-spacing: 3px; color: var(--gold-light); opacity: 0.85; text-transform: uppercase;
        }
        h1 { font-size: 1.65rem; font-weight: 900; color: var(--white); letter-spacing: -0.5px; }

        /* ── 날짜 네비게이션 ── */
        .date-nav {
            display: flex; align-items: center; justify-content: center;
            gap: 10px; width: 100%; margin-top: 4px;
        }
        .nav-btn {
            width: 32px; height: 32px; flex-shrink: 0;
            border: 1px solid rgba(212,160,23,0.4); border-radius: 50%;
            background: rgba(212,160,23,0.2); color: var(--gold-light);
            font-size: 1rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s, transform 0.15s; padding: 0;
        }
        .nav-btn:hover  { background: rgba(212,160,23,0.38); transform: scale(1.1); }
        .nav-btn:active { transform: scale(0.95); }
        .nav-btn:disabled { opacity: 0.25; cursor: not-allowed; transform: none !important; }
        .nav-btn:disabled:hover { background: rgba(212,160,23,0.2); transform: none !important; }

        .date-badge {
            flex: 1;
            display: inline-flex; align-items: center; justify-content: center; gap: 6px;
            padding: 7px 12px; border-radius: 20px;
            background: rgba(212,160,23,0.2); border: 1px solid rgba(212,160,23,0.4);
            color: var(--gold-light); font-size: 0.82rem;
            font-family: 'DM Mono', monospace; letter-spacing: 0.5px;
        }
        .day-tag { font-size: 0.78rem; font-weight: 700; opacity: 0.9; }

        /* ── 초기화 버튼 ── */
        .reset-row {
            display: flex; align-items: center; justify-content: center;
            height: 34px; margin-top: 6px;
        }
        .reset-btn {
            visibility: hidden;
            padding: 7px 22px;
            border: 1px solid rgba(212,160,23,0.5); border-radius: 16px;
            background: rgba(212,160,23,0.15); color: var(--gold-light);
            font-size: 0.8rem; font-family: 'DM Mono', monospace;
            letter-spacing: 1px; cursor: pointer;
            transition: background 0.2s, transform 0.15s;
        }
        .reset-btn.visible { visibility: visible; }
        .reset-btn:hover   { background: rgba(212,160,23,0.32); transform: scale(1.05); }
        .reset-btn:active  { transform: scale(0.96); }

        /* ── 메뉴 박스 래퍼 (페이지 넘김 클립) ── */
        .menu-wrap {
            margin: 14px 0 0;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
        }

        /* ── 메뉴 박스 ── */
        .menu-box {
            padding: 22px 18px;
            border-radius: 20px;
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.1);
            min-height: 160px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: inset 0 2px 12px rgba(0,0,0,0.2);
            position: relative; overflow: hidden;
        }
        .menu-box::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(240,192,64,0.6), transparent);
        }

        /* 페이지 넘김 애니메이션 */
        .menu-box.slide-left-out  { animation: slideLeftOut  0.22s ease-in  both; }
        .menu-box.slide-right-out { animation: slideRightOut 0.22s ease-in  both; }
        .menu-box.slide-left-in   { animation: slideLeftIn   0.28s cubic-bezier(0.22,1,0.36,1) both; }
        .menu-box.slide-right-in  { animation: slideRightIn  0.28s cubic-bezier(0.22,1,0.36,1) both; }

        @keyframes slideLeftOut  { to   { transform: translateX(-60px); opacity: 0; } }
        @keyframes slideRightOut { to   { transform: translateX( 60px); opacity: 0; } }
        @keyframes slideLeftIn   { from { transform: translateX( 60px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideRightIn  { from { transform: translateX(-60px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* ── 메뉴 텍스트 ── */
        #menu-text {
            color: var(--white);
            font-size: 1rem; font-weight: 700; line-height: 2.1;
            white-space: pre-wrap; text-align: center;
            letter-spacing: 0.2px; text-shadow: 0 1px 4px rgba(0,0,0,0.3);
        }

        /* ── 스켈레톤 ── */
        .skeleton-wrap {
            display: flex; flex-direction: column;
            align-items: center; gap: 10px; width: 100%; padding: 4px 8px;
        }
        .skeleton-line {
            height: 14px; border-radius: 7px;
            background: linear-gradient(90deg,
                rgba(255,255,255,0.06) 0%,
                rgba(255,255,255,0.14) 40%,
                rgba(255,255,255,0.06) 100%);
            background-size: 200% 100%;
            animation: shimmer 1.4s ease-in-out infinite;
        }
        .skeleton-line:nth-child(1) { width: 72%; }
        .skeleton-line:nth-child(2) { width: 58%; }
        .skeleton-line:nth-child(3) { width: 78%; }
        .skeleton-line:nth-child(4) { width: 50%; }
        .skeleton-line:nth-child(5) { width: 65%; }
        .skeleton-line:nth-child(6) { width: 55%; animation-delay: 0.1s; }

        @keyframes shimmer {
            0%   { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
.schedule-link-btn {
            display: flex; align-items: center; gap: 7px;
            padding: 10px 22px; border-radius: 16px;
            border: 1px solid rgba(77,184,112,0.35);
            background: rgba(77,184,112,0.1);
            color: rgba(120,220,150,0.9);
            font-size: 0.78rem; font-weight: 700;
            font-family: 'Noto Serif KR', serif;
            text-decoration: none;
            transition: background 0.2s, transform 0.15s;
            width: 100%; justify-content: center;
        }
        .schedule-link-btn:hover  { background: rgba(77,184,112,0.22); transform: scale(1.02); }
        .schedule-link-btn:active { transform: scale(0.97); }

        /* ── 푸터 ── */
        footer {
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.1); margin-top: 16px;
        }
        footer a.contact-link {
            font-size: 0.62rem; font-family: 'DM Mono', monospace;
            letter-spacing: 1.5px; color: rgba(255,255,255,0.25);
            text-decoration: none; transition: color 0.2s;
            display: block; text-align: center; margin-top: 5px;
        }
        footer a.contact-link:hover { color: rgba(120,220,150,0.7); }
        footer p {
            font-size: 0.65rem; font-family: 'DM Mono', monospace;
            letter-spacing: 3px; color: rgba(255,255,255,0.3); text-transform: uppercase;
        }

        @media (max-width: 400px) {
            .card { padding: 26px 18px 22px; margin: 12px; }
            h1    { font-size: 1.45rem; }
        }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>

    <div class="card">
        <header>
            <div class="logo-wrap">
                <img src="logo.svg" alt="방산고 로고">
            </div>
            <span class="school-name">Bangsan High School</span>
            <h1>오늘의 급식</h1>
        </header>

        <main>
            <div class="date-nav">
                <button class="nav-btn" id="btn-prev">&#8592;</button>
                <div class="date-badge">
                    <span>📅</span>
                    <span id="date-display">불러오는 중...</span>
                    <span id="day-display" class="day-tag"></span>
                </div>
                <button class="nav-btn" id="btn-next">&#8594;</button>
            </div>

            <div class="reset-row">
                <button class="reset-btn" id="btn-reset">초기화</button>
            </div>

            <div class="menu-wrap">
                <div class="menu-box" id="menu-box">
                    <!-- 스켈레톤 초기 상태 -->
                    <div class="skeleton-wrap" id="skeleton">
                        <div class="skeleton-line"></div>
                        <div class="skeleton-line"></div>
                        <div class="skeleton-line"></div>
                        <div class="skeleton-line"></div>
                        <div class="skeleton-line"></div>
                        <div class="skeleton-line"></div>
                    </div>
                    <p id="menu-text" style="display:none;"></p>
                </div>
            </div>
        </main>

        <footer>
            <a class="schedule-link-btn" href="https://kbj2425.github.io/bangsanschedule/">
                📅 학사일정 보기
            </a>
            <p>BANGSAN HIGH SCHOOL · MEAL INFO</p>
            <a class="contact-link" href="mailto:26bs007@bangsan.sen.hs.kr">✉ 문의 · 기능 제안: 26bs007@bangsan.sen.hs.kr</a>
        </footer>
    </div>

    <script>
        const CONFIG = {
            API_KEY:     'f7c1da6c25924c5cbe67899392529afb',
            OFFICE_CODE: 'B10',
            SCHOOL_CODE: '7010590'
        };
        const MEAL_CODE  = '2';
        const DAYS       = ['일', '월', '화', '수', '목', '금', '토'];
        const MAX_OFFSET = 5;

        let dayOffset  = 0;
        let isAnimating = false;

        /* ── 유틸 ── */
        function isWeekday(date) { const d = date.getDay(); return d !== 0 && d !== 6; }

        function getBaseDate() {
            const now = new Date();
            if (now.getHours() >= 14) now.setDate(now.getDate() + 1);
            while (!isWeekday(now)) now.setDate(now.getDate() + 1);
            return now;
        }

        function getTargetDate(offset) {
            const base = getBaseDate();
            const step = offset >= 0 ? 1 : -1;
            let count  = Math.abs(offset);
            while (count > 0) { base.setDate(base.getDate() + step); if (isWeekday(base)) count--; }
            return base;
        }

        function formatDate(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}${m}${d}`;
        }

        function updateNavButtons() {
            document.getElementById('btn-prev').disabled = dayOffset <= -MAX_OFFSET;
            document.getElementById('btn-next').disabled = dayOffset >= MAX_OFFSET;
        }

        /* ── API ── */
        async function fetchMeal(date) {
            const yyyymmdd = formatDate(date);
            const url =
                `https://open.neis.go.kr/hub/mealServiceDietInfo` +
                `?KEY=${CONFIG.API_KEY}&Type=json` +
                `&ATPT_OFCDC_SC_CODE=${CONFIG.OFFICE_CODE}` +
                `&SD_SCHUL_CODE=${CONFIG.SCHOOL_CODE}` +
                `&MLSV_YMD=${yyyymmdd}&MMEAL_SC_CODE=${MEAL_CODE}`;
            const res  = await fetch(url);
            if (!res.ok) throw new Error('Network error');
            const data = await res.json();
            if (data.mealServiceDietInfo) {
                const raw = data.mealServiceDietInfo[1].row[0].DDISH_NM;
                return raw
                    .replace(/\([^)]*\)/g, '')
                    .replace(/[\d.]+(?=\s*(<br\/>|$))/g, '')
                    .replace(/\d+(\.\d+)*/g, '')
                    .replace(/<br\/>/g, '\n')
                    .replace(/\s+\n/g, '\n')
                    .trim();
            }
            return null;
        }

        /* ── 애니메이션 헬퍼 ── */
        function animateClass(el, cls) {
            return new Promise(resolve => {
                el.classList.add(cls);
                el.addEventListener('animationend', () => {
                    el.classList.remove(cls);
                    resolve();
                }, { once: true });
            });
        }

        /* ── 스켈레톤 표시/숨김 ── */
        function showSkeleton() {
            document.getElementById('skeleton').style.display = 'flex';
            const mt = document.getElementById('menu-text');
            mt.style.display = 'none';
            mt.innerText = '';
        }

        function showMenu(text) {
            document.getElementById('skeleton').style.display = 'none';
            const mt = document.getElementById('menu-text');
            mt.style.display = 'block';
            mt.innerText = text;
        }

        /* ── 메인 로드 ── */
        async function loadMeal(offset, direction = 'none') {
            if (isAnimating) return;
            isAnimating = true;

            const prevOffset = dayOffset;
            dayOffset = offset;
            updateNavButtons();

            const menuBox  = document.getElementById('menu-box');
            const dateEl   = document.getElementById('date-display');
            const dayEl    = document.getElementById('day-display');
            const resetBtn = document.getElementById('btn-reset');

            const target  = getTargetDate(offset);
            const ymd     = formatDate(target);
            const mm      = ymd.slice(4,6);
            const dd      = ymd.slice(6,8);
            const dayName = DAYS[target.getDay()];

            // 날짜 & 타이틀 즉시 업데이트
            dateEl.innerText = `${ymd.slice(0,4)}년 ${mm}월 ${dd}일`;
            dayEl.innerText  = `(${dayName})`;
            document.title   = `방산고 급식 | ${mm}월 ${dd}일 (${dayName})`;
            resetBtn.className = offset !== 0 ? 'reset-btn visible' : 'reset-btn';

            // 1) 나가는 애니메이션 + 스켈레톤
            if (direction !== 'none') {
                const outClass = direction === 'next' ? 'slide-left-out' : 'slide-right-out';
                await animateClass(menuBox, outClass);
            }

            showSkeleton();

            // 2) 들어오는 애니메이션 시작과 동시에 API 호출
            const inClass = direction === 'next' ? 'slide-left-in'
                          : direction === 'prev' ? 'slide-right-in'
                          : 'slide-left-in';

            const [menu] = await Promise.all([
                fetchMeal(target).catch(() => null),
                direction !== 'none' ? animateClass(menuBox, inClass) : Promise.resolve()
            ]);

            showMenu(menu ?? '이 날은 급식 정보가 없어요 🌿\n(방학 · 공휴일 · 휴업일)');
            isAnimating = false;
        }

        /* ── 이벤트 ── */
        document.getElementById('btn-prev').addEventListener('click', () => {
            if (dayOffset > -MAX_OFFSET) loadMeal(dayOffset - 1, 'prev');
        });
        document.getElementById('btn-next').addEventListener('click', () => {
            if (dayOffset < MAX_OFFSET)  loadMeal(dayOffset + 1, 'next');
        });
        document.getElementById('btn-reset').addEventListener('click', () => loadMeal(0, 'none'));

        /* 스와이프 제스처 */
        let txStart = 0, tyStart = 0;
        document.addEventListener('touchstart', e => {
            txStart = e.touches[0].clientX;
            tyStart = e.touches[0].clientY;
        }, { passive: true });
        document.addEventListener('touchend', e => {
            const dx = e.changedTouches[0].clientX - txStart;
            const dy = e.changedTouches[0].clientY - tyStart;
            if (Math.abs(dx) < 50 || Math.abs(dx) < Math.abs(dy) * 1.5) return;
            if (dx < 0 && dayOffset < MAX_OFFSET)  loadMeal(dayOffset + 1, 'next');
            if (dx > 0 && dayOffset > -MAX_OFFSET) loadMeal(dayOffset - 1, 'prev');
        }, { passive: true });

        document.addEventListener('DOMContentLoaded', () => loadMeal(0, 'none'));
    </script>
</body>
</html>
